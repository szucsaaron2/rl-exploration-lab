name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check rl_exploration_lab/ scripts/ tests/

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

      - name: Smoke test — PPO baseline
        run: |
          python scripts/train.py --method none --env Empty-8x8 --steps 2048 --seeds 0

      - name: Smoke test — RND
        run: |
          python scripts/train.py --method rnd --env Empty-8x8 --steps 2048 --seeds 0
